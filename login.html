    <!-- Page Description -->
    <section>
        <h3>Page Description</h3>
        <p>
            This page allows users to log in to their account or create a new account.
            It is part of the user authentication system required for accessing the platform.
        </p>
    </section>

    <!-- Login Section -->
    <section>
        <h2>Login</h2>
        <form>
            <label>Email:</label><br>
            <input type="text"><br><br>

            <label>Password:</label><br>
            <input type="password"><br><br>

            <button type="submit">Login</button>
        </form>
    </section>

    <!-- Signup Section -->
    <section>
        <h2>Sign Up</h2>
        <form>
            <label>Username:</label><br>
            <input type="text"><br><br>

            <label>Email:</label><br>
            <input type="text"><br><br>

            <label>Password:</label><br>
            <input type="password"><br><br>

            <button type="submit">Create Account</button>
        </form>
    </section>
