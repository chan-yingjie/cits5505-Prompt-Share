<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Prompt Share</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/ui-pages.css">
</head>
<body class="leaderboard-page" id="top">
    <div class="page-shell">
        <header class="topbar">
            <nav class="topnav" aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a href="feed.html">Feed</a>
                <a href="submit-prompt.html">Submit Prompt</a>
                <a class="active" href="leaderboard.html">Leaderboard</a>
                <a href="profile.html">Profile</a>
                <a href="login.html">Login</a>
            </nav>
            <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Open navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <a class="brand" href="index.html" aria-label="Prompt Share home">
                <span>Prompt Share</span>
                <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
            </a>
        </header>

        <main class="lb-layout">

            <!-- ── Hero ── -->
            <section class="lb-hero" aria-label="Leaderboard hero">
                <div class="lb-hero-image" aria-hidden="true">
                    <img src="../static/images/pic7-transparent.png" alt="">
                </div>
                <div class="lb-hero-text">
                    <p class="lb-hero-eyebrow">&#9733; Community Rankings</p>
                    <h1 class="lb-hero-title">The Prompts<br><em class="lb-hero-accent">Everyone Loves</em></h1>
                    <p class="lb-hero-sub">Most liked, saved &amp; viewed — curated entirely by the community.</p>
                </div>
            </section>

            <!-- ── Controls ── -->
            <section class="content-block lb-controls-block" aria-label="Leaderboard filters">
                <div class="lb-controls">
                    <div class="lb-tab-group" role="tablist" aria-label="Leaderboard mode">
                        <button class="lb-tab is-active" id="mode-prompts" type="button" role="tab" aria-selected="true">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="1.5" y="1" width="9" height="12" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M4 4.5h4M4 7h4M4 9.5h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M9 1v3h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            Prompts
                        </button>
                        <button class="lb-tab" id="mode-users" type="button" role="tab" aria-selected="false">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="7" cy="4.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 12c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                            Users
                        </button>
                    </div>

                    <div class="lb-filters">
                        <label class="lb-filter-label" for="metric-select">Sort by</label>
                        <select class="lb-select" id="metric-select" aria-label="Sort by metric">
                            <option value="views">Views</option>
                            <option value="likes">Likes</option>
                            <option value="favorites">Favorites</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- ── Podium (top 3, rendered by JS) ── -->
            <div class="lb-podium-section" aria-label="Top 3">
                <div class="lb-podium" id="lb-podium"></div>
            </div>

            <!-- ── Ranking List (4th onwards) ── -->
            <section class="content-block lb-list-block" aria-label="Full rankings">
                <div class="lb-list-header">
                    <div>
                        <p class="eyebrow" id="results-eyebrow">Prompts</p>
                        <h2 id="results-title">Rankings</h2>
                    </div>
                    <a class="category-link" href="feed.html">Browse feed →</a>
                </div>
                <div class="lb-list" id="leaderboard-list" aria-live="polite"></div>
            </section>

        </main>

        <footer class="site-footer" data-shared-footer aria-labelledby="site-footer-title"></footer>
    </div>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top">Top</button>

    <script src="../static/js/prompt-data.js"></script>
    <script src="../static/js/ui-common.js"></script>
    <script>
    (function () {
        const podiumEl  = document.getElementById("lb-podium");
        const listEl    = document.getElementById("leaderboard-list");
        const metricSel = document.getElementById("metric-select");
        const tabPrompts = document.getElementById("mode-prompts");
        const tabUsers   = document.getElementById("mode-users");
        const eyebrowEl  = document.getElementById("results-eyebrow");
        const titleEl    = document.getElementById("results-title");

        const dataset = Array.isArray(window.promptFeedData) ? window.promptFeedData : [];
        let mode = "prompts";

        /* ── Helpers ── */
        function metricVal(item, m) {
            if (m === "likes")     return Number(item.likes     || 0);
            if (m === "favorites") return Number(item.favorites || 0);
            if (m === "views")     return Number(item.viewCount || 0);
            if (m === "votes")     return Number(item.votes     || 0);
            return 0;
        }

        function initials(name) {
            return String(name || "").split(/[\s._-]+/).filter(Boolean)
                .slice(0, 2).map(p => p[0].toUpperCase()).join("") || "U";
        }

        function esc(v) {
            return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;")
                .replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
        }

        function truncate(t, n) {
            t = String(t || "");
            return t.length <= n ? t : t.slice(0, n - 1).trimEnd() + "…";
        }

        /* pseudo-stable trend for demo: hash title to -9..+18 */
        function trendVal(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
            return (Math.abs(h) % 28) - 9;
        }

        /* ── Fireworks for 1st place ── */
        let fwTimers = [];

        function clearFireworks() {
            fwTimers.forEach(clearTimeout);
            fwTimers = [];
            const card = podiumEl.querySelector('[data-rank="1"]');
            if (card) card.querySelectorAll('.lb-fw-rocket,.lb-fw-particle,.lb-fw-flash').forEach(el => el.remove());
        }

        function launchFirework(card) {
            const w = card.offsetWidth;
            const h = card.offsetHeight;
            const x      = 18 + Math.random() * (w - 36);
            const burstY = 14 + Math.random() * (h * 0.55);
            const startY = h - 4;
            const dy     = burstY - startY;

            const rocket = document.createElement('span');
            rocket.className = 'lb-fw-rocket';
            rocket.style.cssText = `left:${x.toFixed(0)}px;top:${startY}px;--dy:${dy.toFixed(0)}px`;
            card.appendChild(rocket);

            const tBurst = setTimeout(() => {
                rocket.remove();

                /* flash at burst point */
                const flash = document.createElement('span');
                flash.className = 'lb-fw-flash';
                flash.style.cssText = `left:${x.toFixed(0)}px;top:${burstY.toFixed(0)}px`;
                card.appendChild(flash);
                fwTimers.push(setTimeout(() => flash.remove(), 400));

                /* particles */
                const palette = ['#ff6b6b','#fbbf24','#4ecdc4','#a78bfa','#34d399','#fb923c','#f472b6','#60a5fa','#fff176','#ff9ff3'];
                const n = 24 + Math.floor(Math.random() * 10);
                for (let i = 0; i < n; i++) {
                    const angle = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                    const dist  = 50 + Math.random() * 65;
                    const color = palette[i % palette.length];
                    const size  = (5 + Math.random() * 5).toFixed(1);
                    const p = document.createElement('span');
                    p.className = 'lb-fw-particle';
                    p.style.cssText = [
                        `left:${x.toFixed(0)}px`,
                        `top:${burstY.toFixed(0)}px`,
                        `background:${color}`,
                        `box-shadow:0 0 5px 2px ${color}`,
                        `width:${size}px`,
                        `height:${size}px`,
                        `--tx:${(Math.cos(angle) * dist).toFixed(1)}px`,
                        `--ty:${(Math.sin(angle) * dist).toFixed(1)}px`,
                        `animation-duration:${(0.9 + Math.random() * 0.65).toFixed(2)}s`
                    ].join(';');
                    card.appendChild(p);
                    fwTimers.push(setTimeout(() => p.remove(), 1800));
                }
            }, 420);
            fwTimers.push(tBurst);
            fwTimers.push(setTimeout(() => rocket.remove(), 500));
        }

        function initFireworks() {
            const card = podiumEl.querySelector('[data-rank="1"]');
            if (!card) return;
            /* opening salvo: 4 quick bursts */
            [0, 280, 560, 900].forEach(d =>
                fwTimers.push(setTimeout(() => launchFirework(card), d))
            );
            /* continuous barrage */
            function next() {
                launchFirework(card);
                /* occasionally double-launch */
                if (Math.random() > 0.65)
                    fwTimers.push(setTimeout(() => launchFirework(card), 180));
                fwTimers.push(setTimeout(next, 400 + Math.random() * 700));
            }
            fwTimers.push(setTimeout(next, 1300));
        }

        function trendHtml(str) {
            const v = trendVal(str);
            if (v > 0)  return `<span class="lb-trend lb-trend-up">↑${v}</span>`;
            if (v < 0)  return `<span class="lb-trend lb-trend-down">↓${Math.abs(v)}</span>`;
            return `<span class="lb-trend lb-trend-flat">—</span>`;
        }

        function rankBadgeClass(i) {
            if (i === 0) return "lb-rank-gold";
            if (i === 1) return "lb-rank-silver";
            if (i === 2) return "lb-rank-bronze";
            return "";
        }

        function rankLabel(i) {
            return ["🥇","🥈","🥉"][i] || String(i + 1);
        }

        /* ── Podium (top 3) ── */
        function renderPodiumPrompts(items, metric) {
            if (items.length < 1) { podiumEl.innerHTML = ""; return; }

            /* visual order: 2nd, 1st, 3rd */
            const order = [items[1], items[0], items[2]].filter(Boolean);

            podiumEl.innerHTML = order.map(p => {
                const origIdx = items.indexOf(p);
                const href    = `prompt-detail.html?prompt=${encodeURIComponent(p.id || "")}`;
                const aHref   = `profile.html?user=${encodeURIComponent(p.author || "")}`;
                const isFirst = origIdx === 0;
                return `
                <article class="lb-podium-card${isFirst ? " is-first" : ""}" data-rank="${origIdx + 1}">
                    <div class="lb-podium-rank-row">
                        <div class="lb-podium-rank ${rankBadgeClass(origIdx)}">${rankLabel(origIdx)}</div>
                        <span class="lb-podium-rank-label">${["1st Place","2nd Place","3rd Place"][origIdx]}</span>
                    </div>
                    <h3 class="lb-podium-title"><a href="${href}">${esc(truncate(p.title || "Untitled", 60))}</a></h3>
                    <a class="lb-podium-author" href="${aHref}">
                        <div class="lb-podium-avatar">${esc(initials(p.author))}</div>
                        <div>
                            <span class="lb-podium-name">${esc(p.author || "Unknown")}</span>
                            <span class="lb-podium-handle">${esc(p.authorHandle || "")}</span>
                        </div>
                    </a>
                    <p class="lb-podium-desc">${esc(truncate(p.prompt || "", 110))}</p>
                    <div class="lb-podium-stats">
                        <span class="lb-stat">
                            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 12 2 7.2a3 3 0 0 1 4.2-4.3l.8.8.8-.8A3 3 0 0 1 12 7.2L7 12Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            ${Number(p.likes || 0)}
                        </span>
                        <span class="lb-stat">
                            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 7s2.5-4.5 6-4.5S13 7 13 7s-2.5 4.5-6 4.5S1 7 1 7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.8" stroke="currentColor" stroke-width="1.4"/></svg>
                            ${Number(p.viewCount || 0)}
                        </span>
                        <span class="lb-stat lb-stat-primary"><strong>${metricVal(p, metric)}</strong> ${esc(metric)}</span>
                    </div>
                </article>`;
            }).join("");
        }

        function renderPodiumUsers(items, metric) {
            if (items.length < 1) { podiumEl.innerHTML = ""; return; }
            const order = [items[1], items[0], items[2]].filter(Boolean);

            podiumEl.innerHTML = order.map(u => {
                const origIdx = items.indexOf(u);
                const href    = `profile.html?user=${encodeURIComponent(u.author)}`;
                const isFirst = origIdx === 0;
                return `
                <article class="lb-podium-card${isFirst ? " is-first" : ""}" data-rank="${origIdx + 1}">
                    <div class="lb-podium-rank-row">
                        <div class="lb-podium-rank ${rankBadgeClass(origIdx)}">${rankLabel(origIdx)}</div>
                        <span class="lb-podium-rank-label">${["1st Place","2nd Place","3rd Place"][origIdx]}</span>
                    </div>
                    <a class="lb-podium-author lb-podium-author-center" href="${href}">
                        <div class="lb-podium-avatar lb-podium-avatar-lg">${esc(initials(u.author))}</div>
                        <div>
                            <span class="lb-podium-name">${esc(u.author)}</span>
                            <span class="lb-podium-handle">${esc(u.handle)}</span>
                        </div>
                    </a>
                    ${u.bio ? `<p class="lb-podium-desc">${esc(truncate(u.bio, 100))}</p>` : ""}
                    <div class="lb-podium-stats">
                        <span class="lb-stat"><strong>${u.prompts}</strong> prompts</span>
                        <span class="lb-stat">
                            <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 12 2 7.2a3 3 0 0 1 4.2-4.3l.8.8.8-.8A3 3 0 0 1 12 7.2L7 12Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            ${u.likes}
                        </span>
                        <span class="lb-stat lb-stat-primary"><strong>${Number(u[metric] || 0)}</strong> ${esc(metric)}</span>
                    </div>
                </article>`;
            }).join("");
        }

        /* ── Ranking list (4th onwards) ── */
        function renderListPrompts(rows, metric) {
            if (!rows.length) { listEl.innerHTML = `<p class="lb-empty">No more entries.</p>`; return; }
            listEl.innerHTML = rows.map((p, i) => {
                const rank   = i + 4;
                const href   = `prompt-detail.html?prompt=${encodeURIComponent(p.id || "")}`;
                const aHref  = `profile.html?user=${encodeURIComponent(p.author || "")}`;
                return `
                <article class="lb-row">
                    <span class="lb-row-rank">${rank}</span>
                    <div class="lb-row-avatar">${esc(initials(p.author))}</div>
                    <div class="lb-row-info">
                        <a class="lb-row-title" href="${href}">${esc(truncate(p.title || "Untitled", 55))}</a>
                        <a class="lb-row-author" href="${aHref}">${esc(p.author || "")} <span>${esc(p.authorHandle || "")}</span></a>
                    </div>
                    <div class="lb-row-stats">
                        <span>
                            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 12 2 7.2a3 3 0 0 1 4.2-4.3l.8.8.8-.8A3 3 0 0 1 12 7.2L7 12Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            ${Number(p.likes || 0)}
                        </span>
                        <span>
                            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M1 7s2.5-4.5 6-4.5S13 7 13 7s-2.5 4.5-6 4.5S1 7 1 7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.8" stroke="currentColor" stroke-width="1.4"/></svg>
                            ${Number(p.viewCount || 0)}
                        </span>
                    </div>
                    ${trendHtml(p.title || String(rank))}
                </article>`;
            }).join("");
        }

        function renderListUsers(rows, metric) {
            if (!rows.length) { listEl.innerHTML = `<p class="lb-empty">No more entries.</p>`; return; }
            listEl.innerHTML = rows.map((u, i) => {
                const rank  = i + 4;
                const href  = `profile.html?user=${encodeURIComponent(u.author)}`;
                return `
                <article class="lb-row">
                    <span class="lb-row-rank">${rank}</span>
                    <div class="lb-row-avatar">${esc(initials(u.author))}</div>
                    <div class="lb-row-info">
                        <a class="lb-row-title" href="${href}">${esc(u.author)}</a>
                        <span class="lb-row-author">${esc(u.handle)}</span>
                    </div>
                    <div class="lb-row-stats">
                        <span><strong>${u.prompts}</strong> prompts</span>
                        <span>
                            <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M7 12 2 7.2a3 3 0 0 1 4.2-4.3l.8.8.8-.8A3 3 0 0 1 12 7.2L7 12Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
                            ${u.likes}
                        </span>
                    </div>
                    ${trendHtml(u.author)}
                </article>`;
            }).join("");
        }

        /* ── Main render ── */
        function render() {
            const metric    = metricSel.value;
            const direction = -1;

            if (!dataset.length) {
                podiumEl.innerHTML = "";
                listEl.innerHTML   = `<p class="lb-empty">Leaderboard data will appear once the backend is connected.</p>`;
                return;
            }

            if (mode === "prompts") {
                const sorted = [...dataset].sort((a, b) => direction * (metricVal(a, metric) - metricVal(b, metric))).slice(0, 20);
                renderPodiumPrompts(sorted.slice(0, 3), metric);
                renderListPrompts(sorted.slice(3), metric);
            } else {
                const userMap = new Map();
                dataset.forEach(p => {
                    const key = String(p.author || "Unknown");
                    const e   = userMap.get(key) || { author: key, handle: p.authorHandle || "@" + key, bio: p.authorBio || "", prompts: 0, likes: 0, favorites: 0, views: 0, votes: 0 };
                    e.prompts++; e.likes += Number(p.likes||0); e.favorites += Number(p.favorites||0); e.views += Number(p.viewCount||0); e.votes += Number(p.votes||0);
                    userMap.set(key, e);
                });
                const sorted = [...userMap.values()].sort((a, b) => direction * (Number(a[metric]||0) - Number(b[metric]||0))).slice(0, 20);
                renderPodiumUsers(sorted.slice(0, 3), metric);
                renderListUsers(sorted.slice(3), metric);
            }
            clearFireworks();
            initFireworks();
        }

        function setMode(next) {
            mode = next;
            tabPrompts.classList.toggle("is-active", mode === "prompts");
            tabUsers.classList.toggle("is-active", mode === "users");
            tabPrompts.setAttribute("aria-selected", mode === "prompts");
            tabUsers.setAttribute("aria-selected", mode === "users");
            eyebrowEl.textContent = mode === "prompts" ? "Prompts" : "Users";
            titleEl.textContent   = mode === "prompts" ? "Full rankings" : "All users";
            render();
        }

        tabPrompts.addEventListener("click", () => setMode("prompts"));
        tabUsers.addEventListener("click",   () => setMode("users"));
        metricSel.addEventListener("change", render);

        setMode("prompts");

    })();
    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
