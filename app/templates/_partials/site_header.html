<header class="topbar">
    <nav class="topnav" aria-label="Primary navigation">
        <a href="{{ url_for('main.index') }}">Home</a>
        <a href="{{ url_for('main.feed') }}">Explore</a>
        <a href="{{ url_for('main.submit_prompt') }}">Submit Prompt</a>
        <a href="{{ url_for('main.leaderboard') }}">Leaderboard</a>
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('main.profile', user=current_user.username) }}">Profile</a>
        {% else %}
            <a href="{{ url_for('main.login') }}">Login</a>
        {% endif %}
    </nav>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <a class="brand" href="{{ url_for('main.index') }}" aria-label="Prompt Share home">
        <span>Prompt Share</span>
        <span class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
        </span>
    </a>
</header>
