    <section>
        <h3>Page Description</h3>
        <p>
            This page allows users to submit a new prompt to the platform.
            It is designed as the main content contribution page of the application.
        </p>
    </section>

    <section>
        <h2>Submit a New Prompt</h2>
        <form>
            <label for="title">Prompt Title:</label><br>
            <input type="text" id="title" name="title"><br><br>

            <label for="category">Category:</label><br>
            <input type="text" id="category" name="category"><br><br>

            <label for="prompt">Prompt Content:</label><br>
            <textarea id="prompt" name="prompt" rows="6" cols="50"></textarea><br><br>

            <label for="output">Example Output:</label><br>
            <textarea id="output" name="output" rows="6" cols="50"></textarea><br><br>

            <button type="submit">Submit Prompt</button>
        </form>
    </section>

</body>
